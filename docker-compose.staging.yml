# Staging environment overrides.
# Usage: docker compose -f docker-compose.yml -f docker-compose.staging.yml up
#
# This file overrides the base docker-compose.yml for staging:
#   - No live-reload volume mounts (uses built images)
#   - Staging-specific env vars
#   - restart: unless-stopped on all services
#   - Dedicated postgres_staging_data volume for the DB

name: stocky-staging

services:
  db:
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    restart: unless-stopped

  backend:
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://stocky:CHANGE_ME@db:5432/stock_insight_staging}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SECRET_KEY: ${SECRET_KEY:-CHANGE_ME_USE_STRONG_RANDOM_KEY}
      CORS_ORIGINS: ${STAGING_CORS_ORIGINS:-http://staging.example.com}
      ENVIRONMENT: staging
      LOG_LEVEL: WARNING
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    volumes: []
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"
    restart: unless-stopped

  celery-worker:
    volumes: []
    restart: unless-stopped

  celery-beat:
    volumes: []
    restart: unless-stopped

  frontend:
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${STAGING_API_URL:-http://staging-backend:8000}
      NEXT_PUBLIC_APP_ENV: staging
    volumes: []
    command: sh -c "npm run build && npm start"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

volumes:
  postgres_staging_data:
