# Strict CI: Full suite on push to test and main
# Integration tests, E2E smoke, build verification, security scans
name: Strict CI

on:
  push:
    branches: [test, main]

jobs:
  backend-integration:
    name: Backend Integration
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements*.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run Ruff
        run: ruff check app tests

      - name: Run Mypy
        run: mypy app

      - name: Run integration tests
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          SECRET_KEY: test-secret-key-for-ci
          OPENAI_API_KEY: sk-test
          ANTHROPIC_API_KEY: sk-ant-test
        run: pytest tests -v --tb=short --cov=app --cov-report=xml --cov-fail-under=80

  frontend-e2e:
    name: E2E Smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci 2>/dev/null || npm install

      - name: Install Playwright browsers
        run: |
          # Ubuntu 24.04: pre-install libasound2t64 (provides virtual libasound2)
          # so Playwright's --with-deps apt step finds the dependency satisfied
          sudo apt-get update -qq && sudo apt-get install -y libasound2t64
          npx playwright install --with-deps chromium

      - name: Run E2E smoke tests
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
        run: npm run test:e2e -- --project=chromium

  build-images:
    name: Build Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - context: ./backend
            dockerfile: backend/Dockerfile
            image: backend
          - context: ./frontend
            dockerfile: frontend/Dockerfile
            image: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/stocky-${{ matrix.image }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=staging,enable=${{ github.ref == 'refs/heads/test' }}
            type=raw,value=${{ github.run_number }},enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          ignore-unfixed: true
