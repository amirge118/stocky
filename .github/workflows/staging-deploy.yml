# Staging Deploy: Automatic deployment after successful Strict CI on test
name: Staging Deploy

on:
  workflow_run:
    workflows: ["Strict CI"]
    types:
      - completed
    branches: [test]
  workflow_dispatch:
    inputs:
      skip_build:
        description: 'Skip (images already built by Strict CI)'
        required: false
        default: true

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run && github.event.workflow_run.conclusion == 'success')
    environment: staging
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v6

      - name: Deploy to staging
        run: |
          echo "Staging deployment triggered."
          echo "Images available at: ghcr.io/${{ github.repository_owner }}/stocky-backend:staging"
          echo "Images available at: ghcr.io/${{ github.repository_owner }}/stocky-frontend:staging"
          echo ""
          echo "Add your deployment logic here (e.g. kubectl apply, docker compose pull, platform CLI)."
          echo "Use environment secrets: STAGING_DATABASE_URL, STAGING_REDIS_URL, etc."
