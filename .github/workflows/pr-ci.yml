# PR CI: Fast checks for all pull requests (dev, test, main)
# Lint, type-check, unit/component tests, coverage gates
name: PR CI

on:
  pull_request:
    branches: [dev, test, main]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements*.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run Ruff
        run: ruff check app tests

      - name: Run Mypy
        run: mypy app

      - name: Run Pytest
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          SECRET_KEY: test-secret-key-for-ci
          OPENAI_API_KEY: sk-test
          ANTHROPIC_API_KEY: sk-ant-test
        run: |
          if [ "${{ github.base_ref }}" = "main" ] || [ "${{ github.base_ref }}" = "test" ]; then
            COV=55
            TEST_PATH="tests"
          else
            COV=55
            TEST_PATH="tests/unit"
          fi
          pytest $TEST_PATH -v --tb=short --cov=app --cov-report=xml --cov-fail-under=$COV

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci 2>/dev/null || npm install

      - name: Type check
        run: npm run type-check

      - name: ESLint
        run: npm run lint

      - name: Run tests with coverage
        env:
          STRICT_COVERAGE: ${{ github.base_ref == 'test' || github.base_ref == 'main' && 'true' || '' }}
        run: npm run test:coverage -- --ci --coverageReporters=text-summary --coverageReporters=lcov

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    # Requires running stack — enable once staging env is available
    if: github.base_ref == 'test' || github.base_ref == 'main'
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci 2>/dev/null || npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npm run test:e2e

  build-images:
    name: Build Images
    runs-on: ubuntu-latest
    if: github.base_ref == 'test' || github.base_ref == 'main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: backend/Dockerfile
          push: false
          load: true
          tags: stocky-backend:pr
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: false
          load: true
          tags: stocky-frontend:pr
          cache-from: type=gha
          cache-to: type=gha,mode=max
