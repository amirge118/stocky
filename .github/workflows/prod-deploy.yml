# Production Deploy: Automatic deployment after successful Strict CI on main
# Tests are the gate – no approval required (solo developer)
name: Production Deploy

on:
  workflow_run:
    workflows: ["Strict CI"]
    types:
      - completed
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_health_check:
        description: 'Skip post-deploy health check'
        required: false
        default: false
        type: boolean

jobs:
  deploy-production:
    name: Production Deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run && github.event.workflow_run.conclusion == 'success')
    environment: production
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "Production deployment triggered (tests passed)."
          echo "Images: ghcr.io/${{ github.repository_owner }}/stocky-backend:latest"
          echo "Images: ghcr.io/${{ github.repository_owner }}/stocky-frontend:latest"
          echo ""
          echo "Add your deployment logic here (e.g. kubectl apply, docker compose pull, platform CLI)."
          echo "Use environment secrets: PROD_DATABASE_URL, PROD_REDIS_URL, OPENAI_API_KEY, etc."

      - name: Post-deploy health check
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.skip_health_check }}
        run: |
          echo "Add health check: curl -f ${{ secrets.PROD_APP_URL }}/api/v1/health || true"
          echo "Set PROD_APP_URL in production environment secrets for automatic health verification."
          echo "If health check fails, trigger rollback workflow manually."

  create-release:
    name: Create Release Tag
    runs-on: ubuntu-latest
    needs: deploy-production
    if: always() && needs.deploy-production.result == 'success'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Create release tag
        run: |
          VERSION="v$(date +%Y%m%d)-${{ github.run_id }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"
